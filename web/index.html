<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />

  <!-- 모바일 최적화 뷰포트 -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Pick D" />
  <meta name="theme-color" content="#FF6B9D" />

  <!-- 전화번호 자동링크 방지 -->
  <meta name="format-detection" content="telephone=no" />

  <title>Pick D — 나에게 맞는 시술 찾기</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="apple-touch-icon" href="/assets/icon.png" />

  <style>
    /* 전체 모바일 리셋 */
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #F5F5F5;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    }

    #root {
      width: 100%;
      height: 100%;
      /* 모바일에서 최대 너비 제한 — 발표용 데스크탑에서도 예쁘게 */
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 0 40px rgba(0,0,0,0.12);
    }

    /* 스크롤바 숨김 */
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }

    /* 텍스트 선택 방지 (앱처럼) */
    body { -webkit-user-select: none; user-select: none; }

    /* 로딩 스피너 */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      background: #FF6B9D;
    }
    .loading-text {
      font-size: 48px;
      font-weight: 800;
      color: white;
      letter-spacing: -1px;
    }
    .loading-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.8);
    }
    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading" id="splash">
      <div class="loading-text">Pick D</div>
      <div class="loading-sub">나에게 맞는 시술 찾기</div>
      <div class="loading-spinner"></div>
    </div>
  </div>

  <script>
    // 스플래시 숨기기 (React 마운트 후)
    window.__onAppMounted = function() {
      const splash = document.getElementById('splash');
      if (splash) splash.style.display = 'none';
    };
  </script>
</body>
</html>
