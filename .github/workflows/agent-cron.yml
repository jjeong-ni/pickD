name: PickD Agent Daily Analysis

on:
  schedule:
    # KST 03:00 = UTC 18:00 (전날)
    - cron: '0 18 * * *'
  workflow_dispatch: # 수동 실행 허용

jobs:
  agent-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Run agent-analyze Edge Function
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.SUPABASE_FUNCTION_URL }}/agent-analyze" \
            -H "Content-Type: application/json" \
            -H "x-agent-secret: ${{ secrets.AGENT_SECRET }}")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Agent analyze failed with status $HTTP_STATUS: $BODY"
            exit 1
          fi

          echo "Agent analysis completed successfully"
          echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Analyzed: {d.get(\"analyzed\",0)} logs, Proposals: {d.get(\"proposals_created\",0)}, Issues: {d.get(\"issues_created\",0)}')" 2>/dev/null || true
